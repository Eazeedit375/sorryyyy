
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

.page {
  min-height: 480px;
  background: #111318;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 3.5rem 2rem;
  position: relative;
  overflow: hidden;
}

.bg-glow {
  position: absolute;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,180,60,0.07) 0%, transparent 70%);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  animation: breathe 4s ease-in-out infinite;
  pointer-events: none;
}

@keyframes breathe {
  0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 0.6; }
  50% { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
}

.card {
  position: relative;
  z-index: 2;
  max-width: 480px;
  width: 100%;
  text-align: center;
}

.icon-wrap {
  width: 64px; height: 64px;
  margin: 0 auto 2rem;
  position: relative;
  animation: floatUp 0.8s ease both;
}

.icon-circle {
  width: 64px; height: 64px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,180,60,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  animation: rotateBorder 8s linear infinite;
}

.icon-circle-inner {
  width: 46px; height: 46px;
  border-radius: 50%;
  border: 1px solid rgba(255,180,60,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
}

.film-icon {
  width: 22px; height: 18px;
  position: relative;
}
.film-icon svg { width: 100%; height: 100%; }

@keyframes rotateBorder {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.sorry-label {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(255,180,60,0.7);
  margin-bottom: 1rem;
  animation: fadeSlide 0.8s 0.15s ease both;
}

.headline {
  font-family: 'Playfair Display', serif;
  font-size: clamp(30px, 6vw, 42px);
  font-weight: 400;
  color: #f0ece4;
  line-height: 1.2;
  margin-bottom: 0.3em;
  animation: fadeSlide 0.8s 0.25s ease both;
}

.headline em {
  font-style: italic;
  color: rgba(255,180,60,0.9);
}

.desc {
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 300;
  color: rgba(255,255,255,0.38);
  line-height: 1.8;
  margin-bottom: 2.5rem;
  animation: fadeSlide 0.8s 0.4s ease both;
}

.desc strong {
  color: rgba(255,255,255,0.6);
  font-weight: 400;
}

.search-status {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 2.5rem;
  animation: fadeSlide 0.8s 0.55s ease both;
}

.dots-row {
  display: flex;
  gap: 5px;
}
.dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(255,180,60,0.5);
  animation: dotBounce 1.4s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotBounce {
  0%,80%,100% { transform: scale(1); opacity: 0.5; }
  40% { transform: scale(1.5); opacity: 1; }
}

.status-text {
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 400;
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.05em;
}

.divider {
  width: 1px;
  height: 40px;
  background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.1), transparent);
  margin: 0 auto 2.5rem;
  animation: fadeSlide 0.8s 0.65s ease both;
}

.cta-label {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.15em;
  color: rgba(255,255,255,0.2);
  text-transform: uppercase;
  margin-bottom: 1rem;
  animation: fadeSlide 0.8s 0.7s ease both;
}

.btn-wrap {
  animation: fadeSlide 0.8s 0.8s ease both;
}

.dl-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.05em;
  color: #111318;
  background: #f0c060;
  border: none;
  padding: 14px 32px;
  border-radius: 40px;
  cursor: pointer;
  transition: all 0.25s ease;
}

.dl-btn:hover {
  background: #f7d080;
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(255,180,60,0.2);
}
.dl-btn:active { transform: scale(0.97); }

.dl-btn svg { width: 16px; height: 16px; }

.footnote {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  color: rgba(255,255,255,0.12);
  margin-top: 1.5rem;
  letter-spacing: 0.05em;
  animation: fadeSlide 0.8s 1s ease both;
}

@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes floatUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>

<div class="page">
  <div class="bg-glow"></div>

  <div class="card">

    <div class="icon-wrap">
      <div class="icon-circle">
        <div class="icon-circle-inner">
          <div class="film-icon">
            <svg viewBox="0 0 22 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="0.5" y="0.5" width="21" height="17" rx="2" stroke="rgba(255,180,60,0.6)" stroke-width="1"/>
              <rect x="2" y="2" width="4" height="3" rx="0.5" fill="rgba(255,180,60,0.3)"/>
              <rect x="9" y="2" width="4" height="3" rx="0.5" fill="rgba(255,180,60,0.3)"/>
              <rect x="16" y="2" width="4" height="3" rx="0.5" fill="rgba(255,180,60,0.3)"/>
              <rect x="2" y="13" width="4" height="3" rx="0.5" fill="rgba(255,180,60,0.3)"/>
              <rect x="9" y="13" width="4" height="3" rx="0.5" fill="rgba(255,180,60,0.3)"/>
              <rect x="16" y="13" width="4" height="3" rx="0.5" fill="rgba(255,180,60,0.3)"/>
              <circle cx="11" cy="9" r="2.5" stroke="rgba(255,180,60,0.5)" stroke-width="1"/>
              <polygon points="10,7.8 10,10.2 13,9" fill="rgba(255,180,60,0.6)"/>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <p class="sorry-label">We are Sorry</p>

    <h1 class="headline">This video is<br><em>not available</em> yet</h1>

    <p class="desc">
      We are working hard and<br>
      <strong>keep searching for it.</strong><br>
      We'll have it up as soon as possible.
    </p>

    <div class="search-status">
      <div class="dots-row">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <span class="status-text">Searching across sources...</span>
    </div>

    <div class="divider"></div>

    <p class="cta-label">For now, you can</p>

    <div class="btn-wrap">
      <button class="dl-btn" onclick="alert('Starting download...')">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 2v8M5 7l3 3 3-3" stroke="#111318" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 12h12" stroke="#111318" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Download &amp; Watch
      </button>
    </div>

    <p class="footnote">Free · No signup required · Watch offline</p>
  </div>
</div>
